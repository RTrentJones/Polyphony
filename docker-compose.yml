# Polyphony local stack (docs/ADR-001: one app container + its store).
#
# Profiles:
#   dev     — postgres (pgvector) + the app with source bind-mounted and reload
#   preview — postgres (pgvector) + the app AS SHIPPED (production image build);
#             this is what `greenlight preview polyphony` runs against.
#
# Usage:
#   docker compose --profile dev up --build
#   docker compose --profile preview up --build
#   docker compose --profile preview down -v

services:
  postgres:
    # pgvector image: vector search lives IN Postgres (parity with Neon prod)
    image: pgvector/pgvector:pg16
    container_name: polyphony-postgres
    profiles: ["dev", "preview"]
    environment:
      POSTGRES_DB: polyphony
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polyphony"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GREENLIGHT_SHA: ${GREENLIGHT_SHA:-}
    container_name: polyphony-app
    profiles: ["preview"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: development  # preview: don't hard-require an LLM key
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-local_dev_password}@postgres:5432/polyphony
      SECRET_KEY: ${SECRET_KEY:-local_preview_secret_key_32_chars_min!}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-local_admin_password}
      ALLOWED_ORIGINS: http://localhost:8000,http://localhost:3000
    ports:
      - "8000:8000"

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polyphony-app-dev
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-local_dev_password}@postgres:5432/polyphony
      SECRET_KEY: ${SECRET_KEY:-local_preview_secret_key_32_chars_min!}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-local_admin_password}
      ALLOWED_ORIGINS: http://localhost:8000,http://localhost:3000
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/srv/app
      - ./alembic:/srv/alembic
    ports:
      - "8000:8000"

volumes:
  postgres_data:
