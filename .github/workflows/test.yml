name: Test Suite

on:
  push:
    branches: [main, develop, claude/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (libmagic for upload sniffing)
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Tests are BLOCKING: the same suite gates the container build in
      # greenlight-build.yml, so a red test means no image ships.
      - name: Run tests
        env:
          SECRET_KEY: ci_secret_key_minimum_32_characters_long
          POSTGRES_PASSWORD: ci_password_12345
        run: python -m pytest tests -q --no-cov

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Pinned: an unpinned `pip install black ruff` silently tracks the latest
      # release, so a new black stable-style bump reformats files and reddens CI
      # with no code change. Bump these deliberately.
      - name: Install lint tools
        run: pip install 'black==26.5.1' 'ruff==0.15.21'

      - name: Black
        run: black --check app tests alembic

      - name: Ruff
        run: ruff check app tests alembic
