name: evals

# Runs the renamed-public-domain eval suite against a freshly-booted app and
# ingests the scores into Tracer, so voice/plot/continuity quality is trended
# release-over-release (not eyeballed). Manually dispatched (it spends shared
# Gemini free-tier quota) + a weekly baseline.
#
# Secrets this needs on the Polyphony repo (Settings → Secrets and variables →
# Actions):
#   GEMINI_API_KEY      — the model under test boots with it (fail-fast without).
#   TRACER_INGEST_TOKEN — bearer for Tracer /api/ingest; if unset, the run still
#                         produces a report artifact, it just doesn't ingest.
#   GROQ_API_KEY        — free-tier judge (EVAL_JUDGE_PROVIDER=groq); if unset,
#                         the judge falls back to Gemini (self-graded, labelled).
#                         CEREBRAS/OPENROUTER/MISTRAL_API_KEY are alternates.
# ADMIN_* / SECRET_KEY below are throwaway CI values (ephemeral DB), not secrets.

on:
  workflow_dispatch:
    inputs:
      book:
        description: corpus(es) to grade, space-separated (dracula = training, frankenstein = held-out)
        default: dracula frankenstein
      steps:
        description: comma list of steps or 'all'
        default: all
      env_label:
        description: env tag stored on the Tracer run
        default: ci
      base_url:
        description: >-
          grade an EXTERNAL running app (e.g. https://polyphony.rtrentjones.dev
          for a deployed-prompts baseline) instead of booting one here. Leave
          blank to boot this ref's app. External mode needs EVAL_ADMIN_* secrets.
        default: ''
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC — a weekly trend point
  # On-demand trigger for when workflow_dispatch isn't available (e.g. an
  # integration token can't press "Run workflow"): bump evals/.run-eval and push.
  # Path-scoped so ordinary commits don't fire it (this run spends Gemini quota).
  # A push run has no inputs, so it uses the boot-mode defaults: both corpora,
  # all steps, base_url blank (boots this ref's app).
  push:
    paths:
      - evals/.run-eval

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: ci_password_12345
          POSTGRES_DB: polyphony_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      SECRET_KEY: ci_secret_key_minimum_32_characters_long
      DATABASE_URL: postgresql+asyncpg://postgres:ci_password_12345@localhost:5432/polyphony_eval
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Stream the backgrounded app's logs (Python block-buffers a pipe, so a
      # crashed generation's traceback otherwise never reaches the job log).
      PYTHONUNBUFFERED: '1'
      # CI-only: let the app's 500 handler name the real error (429/quota vs
      # safety-block vs bug) in the response so the eval scorecard is
      # self-diagnosing. DEBUG defaults False, so prod leaks nothing.
      DEBUG: 'true'
      # NOTE: do NOT force temperature to 0 here. Temp=0 homogenizes the voice
      # steps (every character answers a prompt near-identically → attribution
      # collapses, prose degenerates), which defeats the voice measurement. Let
      # each call use its natural temperature; use `--repeat` for the noise band
      # on the judge/voice steps instead of killing sampling.
      # First-boot admin (empty DB) → the eval client logs in as this admin,
      # mints an invite, and registers a throwaway user for the run.
      ADMIN_EMAIL: eval-admin@example.com
      ADMIN_PASSWORD: eval_admin_pw_ci_only_12345
      # Boot mode uses the CI admin above; external mode (base_url set) needs the
      # target app's real admin — supply EVAL_ADMIN_* as repo secrets for that.
      EVAL_ADMIN_EMAIL: ${{ secrets.EVAL_ADMIN_EMAIL || 'eval-admin@example.com' }}
      EVAL_ADMIN_PASSWORD: ${{ secrets.EVAL_ADMIN_PASSWORD || 'eval_admin_pw_ci_only_12345' }}
      EVAL_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8000' }}
      EVAL_ENV_LABEL: ${{ github.event.inputs.env_label || 'ci' }}
      EVAL_TRACER_URL: https://tracer.rtrentjones.dev
      TRACER_INGEST_TOKEN: ${{ secrets.TRACER_INGEST_TOKEN }}
      # Judge on a DIFFERENT free vendor than the model under test: removes
      # self-preference bias and takes judge calls off the shared Gemini daily
      # budget. Fail-soft — until GROQ_API_KEY is set the judge falls back to
      # the app provider and the report labels the run self-graded.
      EVAL_JUDGE_PROVIDER: ${{ vars.EVAL_JUDGE_PROVIDER || 'groq' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: System deps (libmagic for upload sniffing)
        run: sudo apt-get update && sudo apt-get install -y libmagic1
      - name: Install
        run: pip install -r requirements.txt
      - name: Preflight — Gemini key present (boot mode only)
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY is not set on this repo — the app can't boot for the eval. Add it in repo Actions secrets."
            exit 1
          fi
      - name: Migrate
        if: ${{ github.event.inputs.base_url == '' }}
        run: python -m alembic upgrade head
      - name: Boot app + wait for health
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/app.pid
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "app healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "::error::app did not become healthy"; exit 1
      - name: Run evals + ingest to Tracer
        env:
          BASE_LABEL: ${{ github.event.inputs.env_label || 'ci' }}
          STEPS: ${{ github.event.inputs.steps || 'all' }}
        run: |
          # Book selection: dispatch input wins; else on a push read the book
          # names from the sentinel file (so a single push can grade just one
          # book to stay inside the Gemini free-tier quota); else both.
          BOOKS="${{ github.event.inputs.book }}"
          if [ -z "$BOOKS" ]; then
            BOOKS="$(grep -oiE 'dracula|frankenstein' evals/.run-eval | tr '\n' ' ' || true)"
          fi
          BOOKS="${BOOKS:-dracula frankenstein}"
          echo "grading books: $BOOKS"
          rc=0
          for BK in $BOOKS; do
            echo "::group::evals $BK"
            # Distinct Tracer env per book so training vs held-out trend apart.
            EVAL_ENV_LABEL="${BASE_LABEL}-${BK}" python -m evals.run \
              --book "$BK" --steps "$STEPS" \
              --out "eval-report-$BK.json" --export "gl-export-$BK.json" --tracer || rc=1
            echo "::endgroup::"
          done
          exit $rc
      - name: Stop app
        if: ${{ always() && github.event.inputs.base_url == '' }}
        run: kill "$(cat /tmp/app.pid)" 2>/dev/null || true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: |
            eval-report-*.json
            gl-export-*.json
          if-no-files-found: warn
