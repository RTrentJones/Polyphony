[pytest]
# Pytest configuration for Polyphony

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --cov=services
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --asyncio-mode=auto

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require services running)
    slow: Slow running tests
    database: Tests that require database
    llm: Tests that call LLM APIs (may cost money)

# Asyncio
asyncio_mode = auto

# Coverage options
[coverage:run]
source = services
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
